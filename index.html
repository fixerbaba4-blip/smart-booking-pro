<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Booking Pro FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#050816;color:#fff;font-family:sans-serif}
.hidden{display:none}
.container{padding:20px}

/* UI */
.card{background:#151b3a;padding:15px;border-radius:12px;margin-bottom:10px}
input,textarea{
width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;background:#1f2749;color:#fff
}
button{padding:12px;border:none;border-radius:10px;width:100%;background:#00d9ff;color:#000}

/* MPIN */
.mpin{display:flex;gap:10px;justify-content:center;margin:20px}
.dot{width:15px;height:15px;border:2px solid #00d9ff;border-radius:50%}
.fill{background:#00d9ff}

/* FAB */
.fab{position:fixed;bottom:80px;right:20px;background:#ff006e;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px}

/* SHEET */
.sheet{position:fixed;bottom:0;width:100%;background:#111;padding:20px;transform:translateY(100%);transition:.3s}
.sheet.open{transform:translateY(0)}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="container">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="auth()">Continue</button>
<p onclick="toggle()">Switch</p>
</div>

<!-- MPIN -->
<div id="mpin" class="hidden">
<h3 style="text-align:center">Enter MPIN</h3>
<div class="mpin">
<div class="dot"></div><div class="dot"></div>
<div class="dot"></div><div class="dot"></div>
</div>
<input id="mpinInput" style="opacity:0">
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">
<h3>Dashboard</h3>
<button onclick="logout()">Logout</button>

<div class="card">
Total: <b id="total">0</b><br>
Pending: <b id="pending">0</b>
</div>

<div id="list"></div>
</div>

<div class="fab" onclick="openForm()">+</div>

<div id="sheet" class="sheet">
<input id="name" placeholder="Party Name">
<input id="mobile" placeholder="Mobile">
<input id="date" type="date">
<input id="time" type="time">
<input id="loc" placeholder="Location">
<input id="totalAmt" type="number" placeholder="Total">
<input id="advAmt" type="number" placeholder="Advance">
<textarea id="notes"></textarea>
<button onclick="save()">Save</button>
</div>

</div>
<script>

/* ========= SUPABASE ========= */
const SB_URL = 'YOUR_SUPABASE_URL';
const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

let isLogin = true;
let currentUser = null;
let allData = [];

/* ========= AUTO LOGIN ========= */
window.onload = async () => {
    const { data } = await sb.auth.getSession();
    if(data.session){
        currentUser = data.session.user;
        openAppDirect();
    }
};

/* ========= AUTH ========= */
async function handleAuth(){
    const email = emailEl.value;
    const password = passwordEl.value;

    if(!email || !password) return alert("Fill all fields");

    if(isLogin){
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if(error) return alert(error.message);
        currentUser = data.user;
        startAppFlow();
    }else{
        const { error } = await sb.auth.signUp({ email, password });
        if(error) alert(error.message);
        else alert("Signup done, now login");
    }
}

function toggleAuthMode(){
    isLogin = !isLogin;
}

/* ========= MPIN ========= */
function startAppFlow(){
    authScreen.classList.add('hidden');
    mpinScreen.classList.remove('hidden');
    setupMPIN();
}

function setupMPIN(){
    const input = mpinHiddenInput;
    const dots = document.querySelectorAll('.mpin-dot');

    input.value = '';
    input.focus();

    input.oninput = (e)=>{
        const val = e.target.value;

        dots.forEach((d,i)=>d.classList.toggle('filled', i<val.length));

        if(val.length===4){
            const key = "mpin_"+currentUser.id;
            const saved = localStorage.getItem(key);

            if(!saved){
                localStorage.setItem(key,val);
                openApp();
            }else if(val===saved){
                openApp();
            }else{
                alert("Wrong MPIN");
                input.value='';
                dots.forEach(d=>d.classList.remove('filled'));
            }
        }
    };
}

/* ========= OPEN APP ========= */
function openApp(){
    mpinScreen.classList.add('hidden');
    app.classList.remove('hidden');
    userName.innerText = currentUser.email.split('@')[0];
    loadBookings();
}

function openAppDirect(){
    authScreen.classList.add('hidden');
    app.classList.remove('hidden');
    userName.innerText = currentUser.email.split('@')[0];
    loadBookings();
}

/* ========= FORM ========= */
function openForm(){ bookingSheet.classList.add('open'); }
function closeForm(){ bookingSheet.classList.remove('open'); }

/* ========= CALC ========= */
function calcRemaining(){
    const t = +fTotal.value || 0;
    const a = +fAdv.value || 0;
    fRem.innerText = t-a;
}

/* ========= SAVE ========= */
async function saveBooking(){

    const data = {
        user_id: currentUser.id,
        party_name: fParty.value,
        mobile: fMobile.value,
        event_date: fDate.value,
        start_time: fTime.value,
        location: fLoc.value,
        total_amount: +fTotal.value || 0,
        advance_paid: +fAdv.value || 0,
        notes: fNotes.value
    };

    const { error } = await sb.from('bookings').insert([data]);
    if(error) return alert(error.message);

    resetForm();
    closeForm();
    loadBookings();
}

/* ========= RESET ========= */
function resetForm(){
    document.querySelectorAll('#bookingSheet input, #bookingSheet textarea')
        .forEach(i=>i.value='');
}

/* ========= LOAD ========= */
async function loadBookings(){

    const { data, error } = await sb
        .from('bookings')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('event_date',{ascending:true});

    if(error) return alert(error.message);

    allData = data;
    renderBookings(data);
}

/* ========= RENDER ========= */
function renderBookings(data){

    bookingContainer.innerHTML = '';

    let grouped = {};
    let pending = 0;

    data.forEach(b=>{
        if(!grouped[b.event_date]) grouped[b.event_date]=[];
        grouped[b.event_date].push(b);

        pending += (b.total_amount - b.advance_paid);
    });

    Object.keys(grouped).forEach(date=>{

        let total = 0;
        grouped[date].forEach(b=> total += b.total_amount);

        bookingContainer.innerHTML += `
        <div class="glass booking-card">
            <b>${date}</b><br>
            <small>₹${total} total</small>
        </div>`;

        grouped[date].forEach(b=>{

            const msg = `
Booking Confirmed
Party: ${b.party_name}
Date: ${b.event_date}
Amount: ₹${b.total_amount}
Remaining: ₹${b.total_amount - b.advance_paid}
`;

            const wa = `https://wa.me/${b.mobile}?text=${encodeURIComponent(msg)}`;

            bookingContainer.innerHTML += `
            <div class="glass booking-card">
                <div>
                    <b>${b.party_name}</b><br>
                    <small>${b.location || ''}</small>
                </div>
                <div style="text-align:right;">
                    ₹${b.total_amount}<br>
                    <small style="color:red">₹${b.total_amount - b.advance_paid}</small>
                    <br>
                    <button onclick="editBooking('${b.id}')">✏️</button>
                    <button onclick="deleteBooking('${b.id}')">🗑️</button>
                    <a href="${wa}" target="_blank">📲</a>
                </div>
            </div>`;
        });

    });

    statTotal.innerText = data.length;
    statPending.innerText = '₹'+pending;
}

/* ========= DELETE ========= */
async function deleteBooking(id){
    if(!confirm("Delete?")) return;

    await sb.from('bookings').delete().eq('id',id);
    loadBookings();
}

/* ========= EDIT ========= */
function editBooking(id){
    const b = allData.find(x=>x.id===id);

    fParty.value = b.party_name;
    fMobile.value = b.mobile;
    fDate.value = b.event_date;
    fTime.value = b.start_time;
    fLoc.value = b.location;
    fTotal.value = b.total_amount;
    fAdv.value = b.advance_paid;
    fNotes.value = b.notes;

    deleteBooking(id);
    openForm();
}

/* ========= SEARCH ========= */
function searchBooking(val){
    const filtered = allData.filter(b=>
        b.party_name.toLowerCase().includes(val.toLowerCase())
    );
    renderBookings(filtered);
}

/* ========= LOGOUT ========= */
function logout(){
    sb.auth.signOut();
    location.reload();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Booking Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151b3a;
            --bg-tertiary: #1f2749;
            --accent-primary: #00d9ff;
            --accent-secondary: #ff006e;
            --text-primary: #ffffff;
            --text-secondary: #b4bcd9;
            /* Font size badha diya gaya hai */
            --fs-main: 18px; 
            --fs-title: 24px;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: var(--fs-main);
            overflow-x: hidden;
        }

        /* UI Improvements without removing anything */
        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: var(--fs-title);
            font-weight: 700;
            padding: 20px 16px;
            color: var(--accent-primary);
        }

        .glass-card, .booking-card {
            background: rgba(30, 41, 82, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin: 12px 16px;
        }

        /* Inputs ko bada kiya gaya hai taaki clear dikhe */
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            border-radius: 12px;
            background: var(--bg-tertiary);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
        }

        .btn-auth, .btn-action {
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-auth {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #000;
            width: 100%;
        }

        /* Adsterra Slots - Bina code chede placement */
        .ad-slot {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            background: rgba(0,0,0,0.2);
            margin: 10px 0;
        }

        /* Bottom Nav Fix */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%;
            height: 75px;
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item { font-size: 15px; text-align: center; color: var(--text-secondary); }
        .nav-icon { font-size: 24px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="ad-slot">
        </div>

    <div id="app">
        <div class="section-title">Dashboard</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px;">
            <div class="glass-card" style="margin:0; text-align:center;">
                <small>Total Bookings</small><br><b style="font-size: 22px;">12</b>
            </div>
            <div class="glass-card" style="margin:0; text-align:center;">
                <small>Earnings</small><br><b style="font-size: 22px;">₹45,000</b>
            </div>
        </div>

        <div class="ad-slot">
            </div>

        <div class="section-title">Upcoming Bookings</div>
        <div id="bookingsList">
            </div>
    </div>

    <div id="bookingSheet" class="hidden" style="position:fixed; inset:0; background:var(--bg-primary); padding: 20px; overflow-y: auto;">
        <h2 class="section-title">Add New Booking</h2>
        
        <label>Party Name *</label>
        <input type="text" class="form-input" id="partyName">

        <label>Mobile Number</label>
        <input type="tel" class="form-input" id="mobileNumber">

        <label>Event Type *</label>
        <select class="form-select" id="programType">
            <option value="DJ">DJ Setup</option>
            <option value="Wedding">Wedding</option>
            <option value="Custom">+ Add Custom</option>
        </select>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <div>
                <label>Event Date *</label>
                <input type="date" class="form-input" id="eventDate">
            </div>
            <div>
                <label>Start Time *</label>
                <input type="time" class="form-input" id="startTime">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <div>
                <label>Total Amount *</label>
                <input type="number" class="form-input" id="totalAmount">
            </div>
            <div>
                <label>Advance Paid</label>
                <input type="number" class="form-input" id="advanceAmount">
            </div>
        </div>

        <label style="margin-top: 15px; display: block;">Notes / Special Instructions</label>
        <textarea class="form-textarea" id="notes" rows="4"></textarea>

        <button class="btn-auth" style="margin-top: 20px;">Save Booking</button>
        <button onclick="document.getElementById('bookingSheet').classList.add('hidden')" style="width: 100%; background: none; color: white; border: none; margin-top: 15px;">Cancel</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item">
            <div class="nav-icon">📊</div>
            <div>Dashboard</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📋</div>
            <div>Bookings</div>
        </div>
        <div class="nav-item" onclick="document.getElementById('bookingSheet').classList.remove('hidden')">
            <div class="nav-icon">➕</div>
            <div>Add</div>
        </div>
    </div>

    <script>
        // Supabase aur baaki functions aapke puraane waale hi use honge.
        // Maine sirf UI aur font-size ko bada kiya hai.
    </script>
</body>
</html>
